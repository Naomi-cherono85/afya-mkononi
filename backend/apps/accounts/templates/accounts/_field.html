{# Renders a single labeled form field with help text and inline errors. #}
<div class="mb-4">
    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-foreground mb-1.5">
        {{ field.label }}{% if field.field.required %}<span class="text-danger"> *</span>{% endif %}
    </label>
    {{ field }}
    {% if field.help_text %}
        <p class="text-xs text-foreground/50 mt-1 leading-snug">{{ field.help_text|safe }}</p>
    {% endif %}
    {% for error in field.errors %}
        <p class="text-xs text-danger mt-1">{{ error }}</p>
    {% endfor %}
</div>
