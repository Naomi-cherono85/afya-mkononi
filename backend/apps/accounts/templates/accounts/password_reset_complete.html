{% extends 'accounts/auth_base.html' %}

{% block title %}Password reset — Afya Mkononi{% endblock %}

{% block card %}
    <div class="flex flex-col items-center text-center">
        <div class="w-14 h-14 rounded-full bg-accent-soft flex items-center justify-center mb-4">
            <svg class="w-7 h-7 text-accent" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-foreground mb-2">Password changed</h1>
        <p class="text-sm text-foreground/60 leading-relaxed mb-6">
            Your password has been updated. You can now sign in with your new password.
        </p>
        <a href="{% url 'accounts:login' %}" class="w-full bg-accent text-white font-medium text-sm py-3 rounded-pill hover:bg-accent-hover transition">
            Go to sign in
        </a>
    </div>
{% endblock %}
